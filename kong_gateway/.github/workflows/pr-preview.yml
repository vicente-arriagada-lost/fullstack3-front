name: "Kong PR Preview"

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1
  KONG_DEPLOY_CONTRACT_PREFIX: /smartlogix/kong/deploy

jobs:
  deploy-preview:
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    concurrency:
      group: kong-preview-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.ACCESS_KEY_SECRET }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR repository
        id: ecr
        run: |
          REPO_URL="$(aws ssm get-parameter --name "${KONG_DEPLOY_CONTRACT_PREFIX}/ecr_repository_url" --query 'Parameter.Value' --output text)"
          echo "repo_url=${REPO_URL}" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push PR image
        id: image
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"
          IMAGE_URI="${{ steps.ecr.outputs.repo_url }}:pr-${{ github.event.pull_request.number }}-${SHORT_SHA}"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Deploy preview service
        id: deploy
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
        run: |
          chmod +x .github/scripts/deploy_preview.sh
          .github/scripts/deploy_preview.sh

      - name: Publish preview details in PR
        uses: actions/github-script@v7
        env:
          PREVIEW_HOST: ${{ steps.deploy.outputs.preview_host }}
          ALB_DNS: ${{ steps.deploy.outputs.alb_dns }}
        with:
          script: |
            const marker = '<!-- kong-preview-comment -->';
            const body = [
              marker,
              'Preview actualizado.',
              `- Host header: \`${process.env.PREVIEW_HOST}\``,
              `- ALB endpoint: \`http://${process.env.ALB_DNS}/\``,
              `- Probar con: \`curl -H "Host: ${process.env.PREVIEW_HOST}" http://${process.env.ALB_DNS}/\``
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  destroy-preview:
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    concurrency:
      group: kong-preview-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.ACCESS_KEY_SECRET }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Destroy preview service
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          chmod +x .github/scripts/destroy_preview.sh
          .github/scripts/destroy_preview.sh
