name: "IaC CI"

on:
  pull_request:
    branches: ["master", "main"]
  push:
    branches: ["master", "main"]

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  TF_INPUT: "false"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Terragrunt
        uses: gruntwork-io/terragrunt-action@53dbdc2c3d43e82bf3bae10b734a968196442bec # v3.2.0
        with:
          tg_version: 1.0.1
          tf_path: terraform

      - name: Terraform Format and Validate
        run: |
          terraform -chdir=infra fmt -check -recursive
          terraform -chdir=infra init -backend=false
          terraform -chdir=infra validate

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terragrunt Validate Transversal
        working-directory: environments/transversal
        run: |
          terragrunt --non-interactive init -reconfigure -backend=false
          terragrunt validate

      - name: Terragrunt Validate Main
        working-directory: environments/main
        env:
          TG_USE_MOCK_DEPENDENCY: "true"
          TF_VAR_mongodb_connection_strings: '{"inventario":"mongodb+srv://validation:validation@validation.mongodb.net/smartlogix"}'
        run: |
          terragrunt --non-interactive init -reconfigure -backend=false
          terragrunt validate
